# anchois-mlops — Docker Compose (Airflow 2.9.3)
# Services : postgres | airflow-init | airflow-scheduler | airflow-webserver | streamlit

x-airflow-common: &airflow-common
  build:
    context: ./airflow
    dockerfile: Dockerfile
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR:                    LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:        postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY:                  "H3MA5ObnGtEyPGTZtvgEcNShS489Bquj7wLiOps9Frk="
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES:               "false"
    AIRFLOW__WEBSERVER__SECRET_KEY:             "anchois_mlops_secret_key_2024"
    SHARED_DATA_PATH:                           /shared/data
    SHARED_MODELS_PATH:                         /shared/models
    RAW_DATA_PATH:                              /data/raw/NASC_anchois.xls
    USE_FAKE_DATA:                              "true"   # "true" = données fictives | "false" = données réelles
  volumes:
    - ./dags:/opt/airflow/dags
    - ./pipeline:/opt/airflow/pipeline
    - ./data:/data:ro
    - airflow_logs:/opt/airflow/logs
    - shared_models:/shared/models
    - shared_data:/shared/data
  depends_on:
    postgres:
      condition: service_healthy

services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER:     airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB:       airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    user: "0:0"   # root pour pouvoir chmod les volumes
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/logs /shared/data /shared/models
        chmod -R 777 /shared/data /shared/models /opt/airflow/logs
        su -s /bin/bash airflow -c "
          airflow db migrate &&
          airflow users create \
            --username admin \
            --password admin \
            --firstname Admin \
            --lastname User \
            --role Admin \
            --email admin@airflow.com || true
        "
    restart: "no"

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "9090:8080"
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  streamlit:
    build:
      context: ./streamlit_app
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    volumes:
      - shared_models:/app/models:ro
      - shared_data:/app/data:ro
    restart: unless-stopped

volumes:
  postgres_data:
  airflow_logs:
  shared_models:
  shared_data:
